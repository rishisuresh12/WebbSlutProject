<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAS 39 Gripen</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="topbar">

        <div class="leftSide">
            <a href="index.html" class="logo">JAS 39 Gripen</a>

            <nav>

                <a href="history.html">Historia</a>
                <a href="variants.html">Versioner</a>
            </nav>
        </div>

        <div class="lang">
            <button onclick="setLang('sv')" class="langBtn">SV</button>
            <button onclick="setLang('en')" class="langBtn">EN</button>
        </div>

    </header>

    <section class="hero">
        <h2 data-sv="Sveriges multirole-stridsflygplan" data-en="Sweden's multirole fighter aircraft">
            Sveriges multirole-stridsflygplan
        </h2>
    </section>

    <main>

        <section class="imageCenter">
            <img src="gripen.avif" alt="JAS Gripen">
        </section>

        <section class="info">
            <h2 data-sv="Vad betyder JAS?" data-en="What does JAS mean?">
                Vad betyder JAS?
            </h2>
            <p data-sv="JAS står för Jakt, Attack och Spaning. Flygplanet kan utföra flera roller i samma uppdrag."
                data-en="JAS stands for Fighter, Attack and Reconnaissance. The aircraft can perform multiple roles in one mission.">
                JAS står för Jakt, Attack och Spaning. Flygplanet kan utföra flera roller i samma uppdrag.
            </p>
        </section>

        <section class="capabilities">
            <h2 data-sv="Kapabiliteter" data-en="Capabilities">Kapabiliteter</h2>

            <div class="card">
                <h3 data-sv="Luftförsvar" data-en="Air Defense">Luftförsvar</h3>
                <p data-sv="Gripen kan snabbt starta och möta hot i luftrummet."
                    data-en="Gripen can rapidly scramble and intercept aerial threats.">
                </p>
            </div>

            <div class="card">
                <h3 data-sv="Precision Attack" data-en="Precision Strike">Precision Attack</h3>
                <p data-sv="Flygplanet kan slå mot mål med hög precision."
                    data-en="The aircraft can strike ground targets with high precision.">
                </p>
            </div>

            <div class="card">
                <h3 data-sv="Spaning" data-en="Reconnaissance">Spaning</h3>
                <p data-sv="Gripen kan samla underrättelser i realtid."
                    data-en="Gripen can gather intelligence in real time.">
                </p>
            </div>

        </section>

    </main>

    <footer>
        <p>Skapad av Rishi 2026</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
